<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenix Universe Store</title>

<style>
body{
margin:0;
background:#050508;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
position:sticky;
top:0;
background:#050508cc;
text-align:center;
padding:15px;
font-size:22px;
color:#c084fc;
text-shadow:0 0 20px #9333ea,0 0 40px #9333ea;
z-index:10;
}

/* MENU */
#menu{
position:fixed;
top:0;
left:-320px;
width:260px;
height:100%;
background:#0a0a0f;
padding:20px;
transition:0.4s;
z-index:1000;
}

/* CONTENEDOR */
.container{
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
padding:20px;
}

/* CARD */
.card{
background:#111;
border-radius:20px;
padding:25px;
width:90%;
max-width:360px;
box-shadow:0 0 15px #9333ea,0 0 40px #9333ea;
transition:0.4s;
opacity:0;
transform:translateY(40px);
}
.card.show{
opacity:1;
transform:translateY(0);
}
.card:hover{
box-shadow:0 0 40px #c084fc,0 0 80px #9333ea;
}

h2{
text-align:center;
color:#c084fc;
text-shadow:0 0 15px #9333ea;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:none;
}

select{background:#1f1f2e;color:white;}

button{
background:linear-gradient(45deg,#9333ea,#c084fc);
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px #9333ea;
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.box{
background:#111;
padding:20px;
border-radius:15px;
width:300px;
text-align:center;
box-shadow:0 0 30px #9333ea;
}

/* NOTIFICACION */
#noti{
position:fixed;
top:-200px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px;
border-radius:15px;
box-shadow:0 0 25px #9333ea;
text-align:center;
width:90%;
max-width:350px;
transition:0.5s;
z-index:2000;
}

#noti.show{
top:20px;
}

/* BOTONES */
.float{
position:fixed;
right:20px;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.whatsapp{bottom:20px;background:#25D366;}
.soporte{bottom:80px;background:#9333ea;}
</style>
</head>

<body>

<!-- NOTIFICACION -->
<div id="noti">
💜 Bienvenido a Zenix Universe Store<br><br>
Sigue el canal:<br>
<a href="https://whatsapp.com/channel/0029Vb7XEcH23n3gfiOUoz0Y" target="_blank" style="color:#c084fc;">
Entrar al canal
</a>
</div>

<!-- MENU -->
<div id="menu">
<h3 style="color:#c084fc;">Menú</h3>
<button onclick="mostrarSeccion('productos')">📦 Productos</button>
<button onclick="mostrarSeccion('numeros')">🌍 Números Virtuales</button>
</div>

<header>
<span onclick="toggleMenu()" style="position:absolute;left:15px;cursor:pointer;">☰</span>
Zenix Universe Store
</header>

<div id="productos" class="container"></div>

<!-- NUMEROS -->
<div id="numeros" class="container" style="display:none;">
<div class="card">
<h2>🌍 Números Virtuales</h2>

<select id="paisNumero">
<option>Colombia</option>
<option>Estados Unidos</option>
<option>Venezuela</option>
<option>México</option>
<option>Argentina</option>
<option>España</option>
<option>Perú</option>
<option>Chile</option>
<option>Brasil</option>
<option>Ecuador</option>
<option>Panamá</option>
<option>India</option>
<option>Rusia</option>
<option>Francia</option>
<option>Alemania</option>
<option>Italia</option>
<option>Canadá</option>
<option>Japón</option>
<option>Corea del Sur</option>
<option>Australia</option>
</select>

<p style="color:#c084fc;">💰 Precio: 5$</p>
<button onclick="comprarNumero()">COMPRAR</button>

</div>
</div>

<!-- MODAL -->
<div id="modal">
<div class="box">

<h3>💳 Pago</h3>
<p id="info"></p>

<select id="pais" onchange="mostrarPago()">
<option value="">Elige tu país</option>
<option value="colombia">Colombia</option>
<option value="venezuela">Venezuela</option>
<option value="rd">RD</option>
<option value="usa">USA</option>
</select>

<div id="metodo"></div>

<button onclick="enviar()">Ya hice el pago</button>
<button onclick="cerrar()" style="background:red;">Cerrar</button>

</div>
</div>

<!-- BOTONES -->
<div class="float whatsapp" onclick="wa()">💬</div>
<div class="float soporte" onclick="alert('Soporte Zenix')">🛠️</div>

<script>

/* NOTIFICACION */
window.onload = () => {
setTimeout(()=>{
document.getElementById("noti").classList.add("show");
},500);

setTimeout(()=>{
document.getElementById("noti").classList.remove("show");
},6000);
};

/* PRODUCTOS */
const productos={
"HG Cheats":["1 DIA 1.20$","10 DIAS 5.70$","30 DIAS 9.20$"],
"LK TEAM":["1 DIA 0.90$","3 DIAS 1.50$","5 DIAS 3.70$","7 DIAS 5.10$","10 DIAS 7.30$","30 DIAS 9.30$"],
"XTFFH4X":["1 DIA 0.90$","3 DIAS 1.50$","7 DIAS 7$","10 DIAS 7.30$","30 DIAS 9.30$"],
"BR MODS":["1 DIA 0.90$","3 DIAS 1.50$","7 DIAS 5.10$","30 DIAS 9.30$"],
"CUBAN MODS":["1 DIA 1.10$","7 DIAS 2.70$","15 DIAS 6.20$","30 DIAS 7.60$"],
"CUBAN RAGE":["1 DIA 0.80$","7 DIAS 4.10$","30 DIAS 7.60$"],
"BEYOND CHEATS":["1 DIA 0.90$","5 DIAS 3.70$","7 DIAS 5.10$","10 DIAS 7.30$","30 DIAS 9.30$"],
"EVO CHEAT":["1 DIA 0.90$","3 DIAS 1.50$","7 DIAS 5.10$","30 DIAS 9.30$"],
"MOD MENU":["PRO 50$","BASICO 45$"],
"BOT TELEGRAM / WHATSAPP":["PRO 50$","BASICO 45$"],
"DRIP":["1 DIA 0.90$","7 DIAS 5.10$","30 DIAS 9.30$"]
};

const cont=document.getElementById("productos");

for(let p in productos){
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h2>${p}</h2>
<select onchange="guardar(this,'${p}')">
${productos[p].map(x=>`<option>${x}</option>`).join("")}
</select>
<button onclick="comprar('${p}')">COMPRAR</button>
`;

cont.appendChild(card);
}

/* MENU */
function toggleMenu(){
let m=document.getElementById("menu");
m.style.left = (m.style.left==="0px") ? "-320px" : "0px";
}

function mostrarSeccion(sec){
document.getElementById("productos").style.display="flex";
document.getElementById("numeros").style.display="none";

if(sec==="numeros"){
document.getElementById("productos").style.display="none";
document.getElementById("numeros").style.display="flex";
}

toggleMenu();
}

/* COMPRA */
let prod="",plan="";

function guardar(s,p){
localStorage.setItem(p,s.value);
}

function comprar(p){
prod=p;
plan=localStorage.getItem(p)||"No seleccionado";

document.getElementById("info").innerHTML=`📦 ${prod}<br>💳 ${plan}`;
document.getElementById("modal").style.display="flex";
}

/* PAGOS */
function mostrarPago(){
let p=document.getElementById("pais").value;
let m=document.getElementById("metodo");

if(p==="colombia"){m.innerHTML="🇨🇴 PayPal: JESUSBARANDICA";}
if(p==="venezuela"){m.innerHTML="🇻🇪 Pago móvil";}
if(p==="rd"){m.innerHTML="🇩🇴 Transferencia";}
if(p==="usa"){m.innerHTML="🇺🇸 PayPal / Zelle";}
}

/* ENVIAR */
function enviar(){
let pais=document.getElementById("pais").value;

let msg=`👋 Bienvenido a Soporte Zenix

📦 ${prod}
💳 ${plan}
🌍 ${pais}

Adjunto comprobante`;

window.open(`https://wa.me/573008405256?text=${encodeURIComponent(msg)}`);
}

/* NUMEROS */
function comprarNumero(){
let pais=document.getElementById("paisNumero").value;

let msg=`👋 Bienvenido a Soporte Zenix

🌍 Número Virtual
📍 ${pais}
💰 5$

Adjunto comprobante`;

window.open(`https://wa.me/573008405256?text=${encodeURIComponent(msg)}`);
}

function cerrar(){document.getElementById("modal").style.display="none";}
function wa(){window.open("https://wa.me/573008405256");}

/* ANIMACION */
const obs=new IntersectionObserver(e=>{
e.forEach(x=>{if(x.isIntersecting)x.target.classList.add("show");});
});
setTimeout(()=>{
document.querySelectorAll(".card").forEach(c=>obs.observe(c));
},300);

</script>

</body>
</html>
